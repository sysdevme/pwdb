services:
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
  app:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${APP_HOST_BIND_IP:-0.0.0.0}:${APP_HOST_BIND_PORT:-8080}:${APP_CONTAINER_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pm_data:
