{{ define "content" }}
<h1 class="h3 mb-3">Shared Password</h1>
<div class="alert alert-info">
  This link expires at {{ .ExpiresAt.Format "2006-01-02 15:04:05 MST" }}.
</div>
<div class="mb-3">
  <label class="form-label">Item</label>
  <input class="form-control" value="{{ .ItemName }}" readonly>
</div>
{{ if .OwnerEmail }}
  <div class="mb-3">
    <label class="form-label">Shared By</label>
    <input class="form-control" value="{{ .OwnerEmail }}" readonly>
  </div>
{{ end }}
{{ if .Username }}
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input class="form-control" value="{{ .Username }}" readonly>
  </div>
{{ end }}
{{ if .URL }}
  <div class="mb-3">
    <label class="form-label">URL</label>
    <input class="form-control" value="{{ .URL }}" readonly>
  </div>
{{ end }}
{{ if .Password }}
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input class="form-control" value="{{ .Password }}" readonly>
  </div>
{{ end }}
{{ if .Notes }}
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea class="form-control" rows="5" readonly>{{ .Notes }}</textarea>
  </div>
{{ end }}
{{ end }}
