{{ define "content" }}
<h1 class="h3 mb-3">Account</h1>
{{ if .Message }}
  <div class="alert alert-success">{{ .Message }}</div>
{{ end }}
{{ if .Error }}
  <div class="alert alert-danger">{{ .Error }}</div>
{{ end }}
<div class="card">
  <div class="card-body">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" value="{{ .User.Email }}" readonly>
    </div>
    <div class="mb-3">
      <label class="form-label">Status</label>
      <input class="form-control" value="{{ .User.Status }}" readonly>
    </div>
    <form method="post" action="/account/update">
      <div class="mb-3">
        <label class="form-label">Current Login Password</label>
        <input type="password" name="current_login_password" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">New Login Password</label>
        <input type="password" name="new_login_password" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Current Master Password</label>
        <input type="password" name="current_master_password" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">New Master Password</label>
        <input type="password" name="new_master_password" class="form-control">
      </div>
      <button class="btn btn-primary" type="submit">Update Credentials</button>
    </form>
  </div>
</div>
{{ end }}
