{{ define "content" }}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Passwords</h1>
  <a class="btn btn-primary" href="/passwords/new">New</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Title</th>
      <th>URL</th>
      <th>Tags</th>
      <th>Groups</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {{ if .Items }}
      {{ range .Items }}
      <tr>
        <td title="Username: {{ .Username }}">{{ .Title }}</td>
        <td>{{ .URL }}</td>
        <td title="Username: {{ .Username }}">{{ .Tags }}</td>
        <td title="Username: {{ .Username }}">{{ .Groups }}</td>
        <td>
          <a href="/passwords/edit?id={{ .ID }}" class="btn btn-sm btn-outline-secondary">Edit</a>
          {{ if $.Unlocked }}
            <a href="/passwords/view?id={{ .ID }}" class="btn btn-sm btn-outline-primary">View</a>
            <a href="/passwords/delete?id={{ .ID }}" class="btn btn-sm btn-outline-danger">Delete</a>
          {{ else }}
            <span class="btn btn-sm btn-outline-primary disabled">View</span>
            <span class="btn btn-sm btn-outline-danger disabled">Delete</span>
          {{ end }}
        </td>
      </tr>
      {{ end }}
    {{ else }}
      <tr><td colspan="5" class="text-muted">No items</td></tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
