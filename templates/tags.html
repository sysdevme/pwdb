{{ define "content" }}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Tags</h1>
  <a class="btn btn-primary" href="#">New</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Items</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {{ if .Items }}
      {{ range .Items }}
      <tr>
        <td>{{ .Name }}</td>
        <td>{{ .Count }}</td>
        <td>
          <a href="#" class="btn btn-sm btn-outline-secondary">Edit</a>
        </td>
      </tr>
      {{ end }}
    {{ else }}
      <tr><td colspan="3" class="text-muted">No tags</td></tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
