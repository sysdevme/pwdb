{{ define "content" }}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Tags</h1>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Items</th>
    </tr>
  </thead>
  <tbody>
    {{ if .Items }}
      {{ range .Items }}
      <tr>
        <td><a href="{{ .URL }}">{{ .Name }}</a></td>
        <td>{{ .Count }}</td>
      </tr>
      {{ end }}
    {{ else }}
      <tr><td colspan="2" class="text-muted">No tags</td></tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
