{{ define "content" }}
<h1 class="h3 mb-3">{{ .Title }}</h1>
<form method="post" action="{{ if .Item.ID }}/passwords/edit{{ else }}/passwords/new{{ end }}">
  {{ if .Item.ID }}
  <input type="hidden" name="id" value="{{ .Item.ID }}">
  {{ end }}
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input name="title" class="form-control" required value="{{ .Item.Title }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input name="username" class="form-control" value="{{ .Item.Username }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <div class="input-group">
      <input name="password" id="passwordField" type="text" class="form-control" required value="{{ .Item.Password }}">
      <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">Generate</button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><button class="dropdown-item" type="button" onclick="genPassword('alnum')">Alpha‑numeric</button></li>
        <li><button class="dropdown-item" type="button" onclick="genPassword('alpha_sep')">Alpha with separator</button></li>
        <li><button class="dropdown-item" type="button" onclick="genPassword('mixed')">Alpha‑digit‑special</button></li>
      </ul>
    </div>
    <div class="row g-2 mt-2">
      <div class="col-md-4">
        <input id="genLength" type="number" class="form-control" min="8" max="64" value="16">
        <div class="form-text">Length (8–64)</div>
      </div>
      <div class="col-md-4">
        <input id="genSep" type="text" class="form-control" value="-">
        <div class="form-text">Separator (alpha‑sep)</div>
      </div>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">URL</label>
    <input name="url" class="form-control" value="{{ .Item.URL }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Tags</label>
    <div class="row g-2">
      <div class="col-md-6">
        <select id="tagsSelect" class="form-select">
          <option value="">Select tag</option>
          {{ range .TagsList }}
            <option value="{{ . }}">{{ . }}</option>
          {{ end }}
        </select>
      </div>
      <div class="col-md-6">
        <input name="tags" id="tagsInput" class="form-control" placeholder="Custom or comma separated" value="{{ .TagsText }}">
      </div>
    </div>
    <div class="form-text">Choose existing or type custom tags (comma separated).</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Groups</label>
    <div class="row g-2">
      <div class="col-md-6">
        <select id="groupsSelect" class="form-select">
          <option value="">Select group</option>
          {{ range .GroupsList }}
            <option value="{{ . }}">{{ . }}</option>
          {{ end }}
        </select>
      </div>
      <div class="col-md-6">
        <input name="groups" id="groupsInput" class="form-control" placeholder="Custom or comma separated" value="{{ .GroupsText }}">
      </div>
    </div>
    <div class="form-text">Choose existing or type custom groups (comma separated).</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="4">{{ .Item.Notes }}</textarea>
  </div>
  <button class="btn btn-primary" type="submit">Save</button>
  <a class="btn btn-outline-secondary" href="/passwords">Cancel</a>
</form>
<script>
  function randInt(max) {
    const arr = new Uint32Array(1);
    window.crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function pick(chars, length) {
    let out = "";
    for (let i = 0; i < length; i++) {
      out += chars[randInt(chars.length)];
    }
    return out;
  }

  function genPassword(kind) {
    const lenField = document.getElementById("genLength");
    const sepField = document.getElementById("genSep");
    let length = parseInt(lenField.value || "16", 10);
    if (isNaN(length) || length < 8) length = 8;
    if (length > 64) length = 64;

    const letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const digits = "0123456789";
    const specials = "!@#$%^&*()-_=+[]{};:,.?/";
    let result = "";

    if (kind === "alnum") {
      result = pick(letters + digits, length);
    } else if (kind === "alpha_sep") {
      const sep = (sepField.value || "-").slice(0, 2);
      const chunk = 4;
      let raw = pick(letters, length);
      let parts = [];
      for (let i = 0; i < raw.length; i += chunk) {
        parts.push(raw.slice(i, i + chunk));
      }
      result = parts.join(sep);
    } else if (kind === "mixed") {
      const all = letters + digits + specials;
      result = pick(all, length);
    }
    document.getElementById("passwordField").value = result;
  }

  function addSelected(selectId, inputId) {
    const select = document.getElementById(selectId);
    const input = document.getElementById(inputId);
    if (!select || !input) return;
    const value = (select.value || "").trim();
    if (!value) return;
    const parts = input.value
      .split(",")
      .map((s) => s.trim())
      .filter((s) => s.length > 0);
    if (!parts.includes(value)) {
      parts.push(value);
    }
    input.value = parts.join(", ");
    select.value = "";
  }

  (function () {
    const tagsSelect = document.getElementById("tagsSelect");
    const groupsSelect = document.getElementById("groupsSelect");
    if (tagsSelect) {
      tagsSelect.addEventListener("change", () => addSelected("tagsSelect", "tagsInput"));
    }
    if (groupsSelect) {
      groupsSelect.addEventListener("change", () => addSelected("groupsSelect", "groupsInput"));
    }
  })();
</script>
{{ end }}
