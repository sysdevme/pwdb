{{ define "content" }}
<div class="alert alert-warning">
  <h1 class="h4 mb-2">{{ .Title }}</h1>
  <p class="mb-0">
    {{ if .ConfirmText }}
      {{ .ConfirmText }}
    {{ else }}
      This action cannot be undone.
    {{ end }}
  </p>
</div>

<form method="post" action="{{ .DeletePath }}" data-require-unlock>
  <input type="hidden" name="id" value="{{ .ItemID }}">
  <div class="mb-3">
    <label class="form-label">Item</label>
    <input class="form-control" value="{{ .ItemName }}" disabled>
  </div>
  {{ if .Unlocked }}
    <div class="alert alert-success">Unlocked. You can continue.</div>
  {{ else }}
    <div class="alert alert-warning">Locked. Use the Unlock button in the top bar to continue.</div>
  {{ end }}
  <button class="btn {{ if eq .ActionLabel "Unshare" }}btn-warning{{ else }}btn-danger{{ end }}" type="submit" {{ if not .Unlocked }}disabled{{ end }}>
    {{ if .ActionLabel }}{{ .ActionLabel }}{{ else }}Delete{{ end }}
  </button>
  <a class="btn btn-outline-secondary" href="/">Cancel</a>
</form>
{{ end }}
